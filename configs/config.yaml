project:
  name: sensor-analytics-dashboard
  version: "1.0.0"
  description: "Live sensor analytics dashboard — Open-Meteo API, PostgreSQL, Streamlit"

sources:
  open_meteo:
    base_url: "https://api.open-meteo.com/v1/forecast"
    locations:
      - name: "Munich"
        latitude: 48.1351
        longitude: 11.5820
        country: "Germany"
      - name: "Berlin"
        latitude: 52.5200
        longitude: 13.4050
        country: "Germany"
      - name: "Hamburg"
        latitude: 53.5511
        longitude: 9.9937
        country: "Germany"
      - name: "Frankfurt"
        latitude: 50.1109
        longitude: 8.6821
        country: "Germany"
      - name: "London"
        latitude: 51.5074
        longitude: -0.1278
        country: "UK"
      - name: "Paris"
        latitude: 48.8566
        longitude: 2.3522
        country: "France"
    variables:
      - temperature_2m
      - relative_humidity_2m
      - dew_point_2m
      - apparent_temperature
      - surface_pressure
      - wind_speed_10m
      - wind_direction_10m
      - precipitation
      - weather_code
    past_hours: 72

database:
  url: "postgresql://analytics:analytics@localhost:5433/sensor_analytics"
  table: "sensor_readings"

dashboard:
  title: "Live Sensor Analytics Dashboard"
  refresh_interval: 3600
  anomaly_threshold_temp: 2.0      # std deviations from rolling mean
  anomaly_threshold_pressure: 2.0

streamlit:
  port: 8501
